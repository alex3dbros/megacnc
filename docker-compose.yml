version: '3'

services:
  db:
    image: postgres
    network_mode: "host"
    environment:
      - POSTGRES_DB=mcccnc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=MccAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: "redis:alpine"
    network_mode: "host"

  web:
    build: .
    command: gunicorn dashboard.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    network_mode: "host"
    depends_on:
      - db
      - redis
    environment:
      # Django citește DB_* din settings.py (nu parsează DATABASE_URL). host = rețea Linux host mode.
      - DB_ENGINE=postgresql
      - DB_NAME=mcccnc
      - DB_USER=postgres
      - DB_PASSWORD=MccAdmin
      - DB_HOST=localhost
      - DB_PORT=5432
      - CELERY_EAGER=False
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - CELERY_RESULT_BACKEND=redis://localhost:6379/0
      - DJANGO_SETTINGS_MODULE=dashboard.settings
    cap_add:
      - NET_ADMIN

  celeryworker:
    build: .
    command: celery -A dashboard worker --loglevel=info
    network_mode: "host"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DB_ENGINE=postgresql
      - DB_NAME=mcccnc
      - DB_USER=postgres
      - DB_PASSWORD=MccAdmin
      - DB_HOST=localhost
      - DB_PORT=5432
      - CELERY_EAGER=False
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - CELERY_RESULT_BACKEND=redis://localhost:6379/0
      - DJANGO_SETTINGS_MODULE=dashboard.settings

  celerybeat:
    build: .
    command: celery -A dashboard beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    network_mode: "host"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DB_ENGINE=postgresql
      - DB_NAME=mcccnc
      - DB_USER=postgres
      - DB_PASSWORD=MccAdmin
      - DB_HOST=localhost
      - DB_PORT=5432
      - CELERY_EAGER=False
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - CELERY_RESULT_BACKEND=redis://localhost:6379/0
      - DJANGO_SETTINGS_MODULE=dashboard.settings

volumes:
  postgres_data:
