services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=mcccnc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=MccAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        gunicorn dashboard.wsgi:application --bind 0.0.0.0:8000 --timeout 600 --graceful-timeout 60
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0
      - BACKUP_ARCHIVE_DIR=/data/backups

  celeryworker:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: celery -A dashboard worker --loglevel=info
    volumes:
      - .:/app
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0

  celerybeat:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: celery -A dashboard beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
  app_data:
