services:
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=mcccnc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=MccAdmin
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: "redis:alpine"

  web:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        gunicorn dashboard.wsgi:application --bind 0.0.0.0:8000 --timeout 600 --graceful-timeout 60
      "
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app

  celeryworker:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: celery -A dashboard worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0

  celerybeat:
    image: ghcr.io/heinz-leiser-ai/megacnc:latest
    command: celery -A dashboard beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:MccAdmin@db:5432/mcccnc
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data: